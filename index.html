<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>利用料金計算ツール</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #222;
      color: #fff;
      padding: 14px 16px;
      text-align: center;
      font-size: 18px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .container {
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    h2 {
      font-size: 16px;
      margin: 18px 0 8px;
      border-left: 4px solid #007bff;
      padding-left: 8px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
    }

    input[type="time"],
    input[type="number"],
    input[type="text"] {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
      background: #fff;
    }

    .option-group-title {
      font-weight: bold;
      margin-top: 10px;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .option-row span {
      font-size: 14px;
      flex: 1;
    }

    .option-row input[type="number"] {
      max-width: 90px;
      text-align: right;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: #fff;
      margin: 16px 0;
      cursor: pointer;
    }

    button:active {
      background: #0056b3;
    }

    .result-card {
      background: #fff;
      border-radius: 10px;
      padding: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }

    .result-card h3 {
      margin: 0 0 8px;
      font-size: 16px;
      border-bottom: 1px solid #eee;
      padding-bottom: 4px;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin: 4px 0;
    }

    .total {
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #ddd;
    }

    .note {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <header>
    利用料金計算ツール
  </header>

  <div class="container">

    <!-- お客様名入力 -->
    <h2>お客様情報</h2>
    <label for="customerName">お客様のお名前</label>
    <input type="text" id="customerName" placeholder="例：山田太郎">

    <!-- 利用時間入力 -->
    <h2>利用時間</h2>
    <label for="startTime">開始時刻</label>
    <input type="time" id="startTime">
    <label for="endTime">終了時刻</label>
    <input type="time" id="endTime">

    <!-- オプション入力 -->
    <h2>オプション</h2>

    <!-- キャストドリンクカテゴリ -->
    <div class="option-group-title">キャストドリンク</div>

    <div class="option-row">
      <span>キャストドリンク（1000円）</span>
      <input type="number" id="castDrink" min="0" value="0">
    </div>

    <div class="option-row">
      <span>キャストドリンクB（1000円）</span>
      <input type="number" id="castDrinkB" min="0" value="0">
    </div>

    <div class="option-row">
      <span>キャストテキーラ（2000円）</span>
      <input type="number" id="castTequila" min="0" value="0">
    </div>

    <div class="option-row">
      <span>キャストクライナー（1000円）</span>
      <input type="number" id="castKleiner" min="0" value="0">
    </div>

    <!-- 一般ドリンク -->
    <div class="option-group-title">一般ドリンク</div>

    <div class="option-row">
      <span>一般テキーラ（1000円）</span>
      <input type="number" id="generalTequila" min="0" value="0">
    </div>

    <div class="option-row">
      <span>一般クライナー（1000円）</span>
      <input type="number" id="generalKleiner" min="0" value="0">
    </div>

    <!-- ボトル類 -->
    <div class="option-group-title">ボトル類</div>

    <div class="option-row">
      <span>カフェドパリ（8000円）</span>
      <input type="number" id="cafeDeParis" min="0" value="0">
    </div>

    <div class="option-row">
      <span>オリシャン（16000円）</span>
      <input type="number" id="originalChampagne" min="0" value="0">
    </div>

    <div class="option-row">
      <span>モエロゼ（32000円）</span>
      <input type="number" id="moetRose" min="0" value="0">
    </div>

    <div class="option-row">
      <span>モエアイス（64000円）</span>
      <input type="number" id="moetIce" min="0" value="0">
    </div>

    <div class="option-row">
      <span>ドンペリ（96000円）</span>
      <input type="number" id="domPerignon" min="0" value="0">
    </div>

    <div class="option-row">
      <span>エンジェル（128000円）</span>
      <input type="number" id="angel" min="0" value="0">
    </div>

    <!-- 計算ボタン -->
    <button onclick="calculate()">料金を計算する ▶︎</button>

    <!-- 結果表示 -->
    <div id="resultArea" class="result-card" style="display:none;">
      <h3>計算結果</h3>

      <div class="result-row">
        <span>お客様名</span>
        <span id="displayCustomerName"></span>
      </div>

      <div class="result-row">
        <span>利用時間</span>
        <span id="displayDuration"></span>
      </div>

      <div class="result-row">
        <span>基本料金</span>
        <span id="displayBaseFee"></span>
      </div>

      <div class="result-row">
        <span>延長料金（30分単位）</span>
        <span id="displayExtraFee"></span>
      </div>

      <div class="result-row">
        <span>延長コマ数</span>
        <span id="displayExtraUnits"></span>
      </div>

      <div class="result-row">
        <span>オプション料金</span>
        <span id="displayOptionFee"></span>
      </div>

      <div class="note" id="optionBreakdown"></div>

      <div class="total">
        合計金額：<span id="displayTotal"></span>
      </div>
    </div>
  </div>

  <script>
    function parseTimeToMinutes(timeStr) {
      if (!timeStr) return null;
      const [h, m] = timeStr.split(":").map(Number);
      return h * 60 + m;
    }

    function formatYen(value) {
      return value.toLocaleString("ja-JP") + "円";
    }

    function calculate() {
      const customerName = document.getElementById("customerName").value || "（未入力）";

      const startStr = document.getElementById("startTime").value;
      const endStr = document.getElementById("endTime").value;

      const startMin = parseTimeToMinutes(startStr);
      const endMin = parseTimeToMinutes(endStr);

      if (startMin === null || endMin === null) {
        alert("開始時刻と終了時刻を入力してください。");
        return;
      }

      let duration = endMin - startMin;
      if (duration <= 0) {
        alert("終了時刻は開始時刻より後にしてください。");
        return;
      }

      const hours = Math.floor(duration / 60);
      const minutes = duration % 60;

      const baseFee = 3000;

      const extraMinutes = Math.max(0, duration - 60);
      const extraUnits = extraMinutes > 0 ? Math.ceil(extraMinutes / 30) : 0;
      const extraFee = extraUnits * 1000;

      const castDrink = Number(document.getElementById("castDrink").value || 0);
      const castDrinkB = Number(document.getElementById("castDrinkB").value || 0);
      const castTequila = Number(document.getElementById("castTequila").value || 0);
      const castKleiner = Number(document.getElementById("castKleiner").value || 0);

      const generalTequila = Number(document.getElementById("generalTequila").value || 0);
      const generalKleiner = Number(document.getElementById("generalKleiner").value || 0);

      const cafeDeParis = Number(document.getElementById("cafeDeParis").value || 0);
      const originalChampagne = Number(document.getElementById("originalChampagne").value || 0);
      const moetRose = Number(document.getElementById("moetRose").value || 0);

      const moetIce = Number(document.getElementById("moetIce").value || 0);
      const domPerignon = Number(document.getElementById("domPerignon").value || 0);
      const angel = Number(document.getElementById("angel").value || 0);

      const optionFee =
        castDrink * 1000 +
        castDrinkB * 1000 +
        castTequila * 2000 +
        castKleiner * 1000 +
        generalTequila * 1000 +
        generalKleiner * 1000 +
        cafeDeParis * 8000 +
        originalChampagne * 16000 +
        moetRose * 32000 +
        moetIce * 64000 +
        domPerignon * 96000 +
        angel * 128000;

      const optionLines = [];
      if (castDrink > 0) optionLines.push(`キャストドリンク × ${castDrink}：${formatYen(castDrink * 1000)}`);
      if (castDrinkB > 0) optionLines.push(`キャストドリンクB × ${castDrinkB}：${formatYen(castDrinkB * 1000)}`);
      if (castTequila > 0) optionLines.push(`キャストテキーラ × ${castTequila}：${formatYen(castTequila * 2000)}`);
      if (castKleiner > 0) optionLines.push(`キャストクライナー × ${castKleiner}：${formatYen(castKleiner * 1000)}`);
      if (generalTequila > 0) optionLines.push(`一般テキーラ × ${generalTequila}：${formatYen(generalTequila * 1000)}`);
      if (generalKleiner > 0) optionLines.push(`一般クライナー × ${generalKleiner}：${formatYen(generalKleiner * 1000)}`);
      if (cafeDeParis > 0) optionLines.push(`カフェドパリ × ${cafeDeParis}：${formatYen(cafeDeParis * 8000)}`);
      if (originalChampagne > 0) optionLines.push(`オリシャン × ${originalChampagne}：${formatYen(originalChampagne * 16000)}`);
      if (moetRose > 0) optionLines.push(`モエロゼ × ${moetRose}：${formatYen(moetRose * 32000)}`);
      if (moetIce > 0) optionLines.push(`モエアイス × ${moetIce}：${formatYen(moetIce * 64000)}`);
      if (domPerignon > 0) optionLines.push(`ドンペリ × ${domPerignon}：${formatYen(domPerignon * 96000)}`);
      if (angel > 0) optionLines.push(`エンジェル × ${angel}：${formatYen(angel * 128000)}`);

      const total = baseFee + extraFee + optionFee;

      document.getElementById("displayCustomerName").innerText = customerName;
      document.getElementById("displayDuration").innerText = `${hours}時間${minutes}分`;
      document.getElementById("displayBaseFee").innerText = formatYen(baseFee);
      document.getElementById("displayExtraFee").innerText = formatYen(extraFee);
      document.getElementById("displayExtraUnits").innerText = `${extraUnits}コマ（${extraMinutes}分）`;
      document.getElementById("displayOptionFee").innerText = formatYen(optionFee);
      document.getElementById("displayTotal").innerText = formatYen(total);

      document.getElementById("optionBreakdown").innerText =
        optionLines.length > 0 ? optionLines.join("\n") : "オプション利用なし";

      document.getElementById("resultArea").style.display = "block";
    }
  </script>
</body>
</html>
